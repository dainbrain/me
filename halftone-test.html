<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>halftone test</title>
  <style>
    circle {
        transition: transform 0.2s ease-in-out;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Select all circle elements
        const circles = document.querySelectorAll('circle');
        const R = 50; // Radius of the effect (in SVG units)
        const s_max = 1.5; // Maximum scale factor for the hovered circle

        // Add CSS transition dynamically
        const style = document.createElement('style');
        style.textContent = 'circle { transition: transform 0.2s ease-in-out; }';
        document.head.appendChild(style);

        // Store circle data for efficiency
        const circleData = Array.from(circles).map(circle => ({
            element: circle,
            cx: parseFloat(circle.getAttribute('cx')),
            cy: parseFloat(circle.getAttribute('cy'))
        }));

        // Add event listeners to each circle
        circleData.forEach(({ element, cx, cy }) => {
            element.addEventListener('mouseover', () => {
            circleData.forEach(({ element: c, cx: c_cx, cy: c_cy }) => {
                // Calculate distance from hovered circle
                const d = Math.sqrt((cx - c_cx) ** 2 + (cy - c_cy) ** 2);
                // Compute scale factor: linear falloff from s_max to 1 over distance R
                const s = d < R ? 1 + (s_max - 1) * (1 - d / R) : 1;
                // Apply transform, scaling around the circle's center
                c.setAttribute('transform', `translate(${c_cx} ${c_cy}) scale(${s}) translate(${-c_cx} ${-c_cy})`);
            });
            });

            element.addEventListener('mouseout', () => {
            circleData.forEach(({ element: c, cx: c_cx, cy: c_cy }) => {
                // Reset transform, maintaining structure for smooth transition
                c.setAttribute('transform', `translate(${c_cx} ${c_cy}) scale(1) translate(${-c_cx} ${-c_cy})`);
            });
            });
        });
    });
  </script>
</head>
