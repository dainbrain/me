<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Starter UI bit — gradient mesh and a little motion.">
  <title>Hello (starter)</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      color: #e8e6e3;
      background: #0c0b0a;
      overflow: hidden;
    }
    .blob {
      width: min(72vmin, 420px);
      aspect-ratio: 1;
      border-radius: 42% 58% 62% 38% / 46% 38% 62% 54%;
      background:
        radial-gradient(circle at 30% 30%, #ff6b4a 0%, transparent 45%),
        radial-gradient(circle at 70% 60%, #4a9fff 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, #c084fc 0%, transparent 40%);
      filter: blur(0px);
      animation: morph 14s ease-in-out infinite;
    }
    @keyframes morph {
      0%, 100% { border-radius: 42% 58% 62% 38% / 46% 38% 62% 54%; transform: rotate(0deg) scale(1); }
      33% { border-radius: 62% 38% 42% 58% / 54% 62% 38% 46%; transform: rotate(120deg) scale(1.05); }
      66% { border-radius: 38% 62% 54% 46% / 62% 46% 54% 38%; transform: rotate(240deg) scale(0.95); }
    }
    p {
      position: absolute;
      bottom: 12%;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div class="blob" aria-hidden="true"></div>
  <p>uibits / hello</p>
</body>
</html>
