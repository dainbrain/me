<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WebGPU shader overlay with draggable widgets and switchable effects (goo, water, smoke).">
  <title>WebGPU shader overlay</title>
  <link rel="stylesheet" href="quest-log.css">
  <style>
    :root {
      --background-color: #0E0C0A;
      --foreground-color: #F2F2F2;
      --highlight-color: #58C2FF;
      --control-bg: rgba(14, 12, 10, 0.82);
      --control-border: rgba(88, 194, 255, 0.18);
      --presence-available: #22c55e;
      --presence-busy: #dc2626;
      --presence-offline: #737373;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; background: #000; font-family: "IBM Plex Mono", ui-monospace, monospace; display: flex; justify-content: center; align-items: center; }

    body {
      width: 1512px;
      height: 982px;
      max-width: 100vw;
      max-height: 100vh;
      position: relative;
      overflow: hidden;
      background: var(--background-color) url('desktop-mockup.jpg') center / cover no-repeat;
      flex-shrink: 0;
    }

    canvas#shader {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .widget-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .widget {
      position: absolute;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .circle {
      background-color: var(--highlight-color);
      border: 3px solid var(--highlight-color);
      border-radius: 50%;
      aspect-ratio: 1;
      color: var(--background-color);
      overflow: hidden;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .circle .icon {
      width: 85%;
      height: 85%;
    }

    .circle--hub {
      width: 40px; 
      height: 40px;
      cursor: pointer;
      transition: transform 200ms ease;
      position: relative;
      z-index: 2;
    }
    .circle--hub:hover { transform: scale(1.08); }
    .circle--hub .icon { width: 75%; height: 75%; }

    .circle--avatar {
      position: relative;
      z-index: 4;
      width: 52px;
      height: 52px;
      transition: border-color 180ms ease, opacity 180ms ease;
    }
    .circle--avatar img {
      transition: filter 180ms ease;
    }
    .circle--avatar[data-presence="available"] {
      border-color: var(--presence-available);
      opacity: 1;
    }
    .circle--avatar[data-presence="available"] img {
      filter: saturate(1);
    }
    .circle--avatar[data-presence="busy"] {
      border-color: var(--presence-busy);
      opacity: 0.75;
    }
    .circle--avatar[data-presence="busy"] img {
      filter: saturate(0.68);
    }
    .circle--avatar[data-presence="offline"] {
      border-color: var(--presence-offline);
      opacity: 0.75;
    }
    .circle--avatar[data-presence="offline"] img {
      filter: saturate(0.35) grayscale(0.5);
    }

    /* 18×18 status emoji; top-right when hub is on the left edge, top-left when on the right edge */
    .avatar-status {
      position: absolute;
      z-index: 7;
      width: 18px;
      height: 18px;
      top: -2px;
      right: -2px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 16px;
      line-height: 1;
      pointer-events: none;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55), 0 2px 5px rgba(0, 0, 0, 0.45), 0 0 1px rgba(0, 0, 0, 0.4);
    }
    #radial-widget.avatar-status-left .avatar-status {
      right: auto;
      left: -2px;
    }

    /* PTT button */
    .avatar-ptt {
      position: absolute;
      z-index: 6;
      width: 100%;
      height: 100%;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.25);
      border-radius: 50%;
    }
    .avatar-ptt svg {
      color: var(--highlight-color);
      width: 20px;
      height: 20px;
      filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.5));
    }
    /* Slack-style card behind avatar (opens on click); screen share docks top-right when open.
       Collapsed: 0×0 (no border/shadow/blur) so nothing shows under translucent avatars. Open: slides
       to below + right of avatar (mirrored on right edge) — ~280px wide. */
    .avatar-info-card {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 50%;
      right: auto;
      transform: translate(-50%, -50%);
      width: 0;
      max-width: 0;
      height: 0;
      max-height: 0;
      padding: 0;
      box-sizing: border-box;
      pointer-events: none;
      overflow: hidden;
      border-radius: 0;
      background: transparent;
      border: none;
      backdrop-filter: none;
      transform-origin: center center;
      transition: transform 0.26s ease, max-width 0.26s ease, max-height 0.26s ease, padding 0.26s ease,
        border-radius 0.26s ease, box-shadow 0.26s ease, top 0.26s ease, left 0.26s ease, right 0.26s ease,
        border-color 0.26s ease, background 0.26s ease, backdrop-filter 0.26s ease;
      box-shadow: none;
    }
    .radial-item.avatar-info-open .avatar-info-card {
      left: 60px;
      top: 16px;
      right: auto;
      transform: none;
      transform-origin: top left;
      width: 280px;
      max-width: 280px;
      height: auto;
      max-height: min(380px, 70vh);
      min-height: 0;
      pointer-events: auto;
      overflow: hidden;
      padding: 10px 10px 12px;
      border-radius: 10px;
      z-index: 2;
      background: rgba(14, 12, 10, 0.25);
      border: 1px solid rgba(88, 194, 255, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(88, 194, 255, 0.10) inset;
    }
    #radial-widget.avatar-status-left .radial-item.avatar-info-open .avatar-info-card {
      left: auto;
      right: 60px;
      transform-origin: top right;
    }
    @keyframes slack-card-surface-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    .avatar-info-card__surface {
      display: none;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .radial-item.avatar-info-open .avatar-info-card__surface {
      display: flex;
      animation: slack-card-surface-in 0.26s ease forwards;
    }
    .radial-item[data-screen-sharing].avatar-info-open .avatar-info-card__surface {
      padding-right: 8px;
    }
    .avatar-info-card__handle {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--highlight-color);
      letter-spacing: 0.02em;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    }
    .avatar-info-card__slack {
      font-size: 0.65rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.72);
      margin: 0;
      overflow-wrap: break-word;
      max-width: 100%;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
    }
    .avatar-info-card__compose {
      display: flex;
      align-items: stretch;
      gap: 6px;
      margin-top: 4px;
    }
    .avatar-info-card__input {
      flex: 1;
      min-width: 0;
      font-family: inherit;
      font-size: 0.65rem;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(88, 194, 255, 0.18);
      background: rgba(88, 194, 255, 0.05);
      color: var(--foreground-color);
      outline: none;
      transition: border-color 140ms ease, background 140ms ease;
    }
    .avatar-info-card__input:focus {
      border-color: rgba(88, 194, 255, 0.40);
      background: rgba(88, 194, 255, 0.07);
    }
    .avatar-info-card__input::placeholder {
      color: rgba(242, 242, 242, 0.25);
    }
    .avatar-info-card__send {
      flex-shrink: 0;
      width: 30px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid rgba(88, 194, 255, 0.28);
      background: rgba(88, 194, 255, 0.08);
      color: var(--highlight-color);
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease;
    }
    .avatar-info-card__send:hover {
      background: rgba(88, 194, 255, 0.18);
      border-color: rgba(88, 194, 255, 0.45);
    }
    .avatar-info-card__send svg {
      width: 17px;
      height: 17px;
    }

    /* Screen-share preview: behind avatar (z 1) when collapsed. Expanded (Slack closed): same top/left
       as collapsed — only width/height grow; z above avatar for hover. */
    .avatar-screen-preview {
      display: none;
      position: absolute;
      z-index: 1;
      width: 96px;
      height: calc(96px * 19 / 30);
      top: 0px;
      left: 60px;
      right: auto;
      bottom: auto;
      box-sizing: border-box;
      border-radius: 4px;
      border: 1px solid rgba(88, 194, 255, 0.22);
      background: url('desktop-mockup.jpg') center / cover no-repeat;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(0, 0, 0, 0.15);
      opacity: 0.55;
      transition: width 0.28s ease, height 0.28s ease, box-shadow 0.28s ease, border-radius 0.28s ease,
        top 0.28s ease, left 0.28s ease, right 0.28s ease, transform 0.28s ease, opacity 0.2s ease,
        border-color 0.2s ease;
      cursor: default;
    }
    .avatar-screen-preview:hover {
      opacity: 1;
      border-color: rgba(88, 194, 255, 0.45);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 0, 0, 0.25);
    }
    .radial-item[data-screen-sharing] .avatar-screen-preview {
      display: block;
      pointer-events: auto;
    }
    #radial-widget.avatar-status-left .radial-item[data-screen-sharing]:not(.avatar-info-open):not(.screen-preview-expanded) .avatar-screen-preview {
      left: auto;
      right: 60px;
      top: 0;
    }
    /* Slack open (not expanded): tuck top-right of Slack card (match collapsed mini width). */
    .radial-item[data-screen-sharing].avatar-info-open:not(.screen-preview-expanded) .avatar-screen-preview {
      top: 0;
      left: 60px;
      right: auto;
    }
    #radial-widget.avatar-status-left .radial-item[data-screen-sharing].avatar-info-open:not(.screen-preview-expanded) .avatar-screen-preview {
      left: auto;
      right: 60px;
      top: 0;
    }
    /* Expanded, Slack closed: keep collapsed top/left/right; only grow size. */
    .radial-item[data-screen-sharing].screen-preview-expanded:not(.avatar-info-open) .avatar-screen-preview {
      z-index: 8;
      transform: none;
      width: 280px;
      height: calc(280px * 19 / 30);
      border-radius: 5px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    /* Mirror hub: collapsed position is in a :not(.screen-preview-expanded) rule — repeat here so expand keeps it. */
    #radial-widget.avatar-status-left .radial-item[data-screen-sharing].screen-preview-expanded:not(.avatar-info-open) .avatar-screen-preview {
      left: auto;
      right: 60px;
      top: 0;
    }
    /* Expanded + Slack open: same top/left as your Slack-open mini; only size grows. */
    .radial-item[data-screen-sharing].avatar-info-open.screen-preview-expanded .avatar-screen-preview {
      z-index: 8;
      top: 0;
      left: 55px;
      right: auto;
      transform: none;
      width: 280px;
      height: calc(280px * 19 / 30);
      border-radius: 5px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(0, 0, 0, 0.35);
    }
    #radial-widget.avatar-status-left .radial-item[data-screen-sharing].avatar-info-open.screen-preview-expanded .avatar-screen-preview {
      left: auto;
      right: 55px;
      top: 0;
    }
    .radial-item.screen-preview-expanded {
      z-index: 12;
      overflow: visible;
    }

    .circle--crosshair {
      /* Match team/quest hubs (same size + fill/border/icon treatment). */
      width: 40px;
      height: 40px;
      cursor: pointer;
      background-color: var(--highlight-color);
      border-color: var(--highlight-color);
      color: var(--background-color);
      transition: transform 200ms ease;
    }
    .circle--crosshair:hover {
      transform: scale(1.08);
    }
    .circle--crosshair:active { transform: scale(0.96); }
    .circle--crosshair .icon { stroke: currentColor; width: 75%; height: 75%; }

    .radial-menu {
      position: relative;
      overflow: visible;
    }

    #radial-widget {
      overflow: visible;
    }

    .radial-item {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: -26px;
      margin-top: -26px;
      pointer-events: none;
      opacity: 0;
      transform: translate(0, 0) scale(0);
      transition: transform 420ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 200ms ease;
    }

    .radial-menu.open .radial-item {
      pointer-events: auto;
      opacity: 1;
    }

    .radial-item:nth-child(1) { transition-delay: 0ms; }
    .radial-item:nth-child(2) { transition-delay: 50ms; }
    .radial-item:nth-child(3) { transition-delay: 100ms; }
    .radial-item:nth-child(4) { transition-delay: 150ms; }
    .radial-item:nth-child(5) { transition-delay: 200ms; }

    .widget.snapped {
      transition: left 250ms cubic-bezier(0.22, 1, 0.36, 1),
                  right 250ms cubic-bezier(0.22, 1, 0.36, 1),
                  top 250ms cubic-bezier(0.22, 1, 0.36, 1),
                  bottom 250ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      .radial-item { transition: none; }
      .widget.snapped { transition: none; }
      .avatar-info-card { transition: none; }
      .radial-item.avatar-info-open .avatar-info-card__surface {
        animation: none;
        opacity: 1;
      }
    }

    .controls-panel {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls-panel button {
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      color: var(--foreground-color);
      font-family: inherit;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: border-color 180ms ease, background 180ms ease;
    }
    .controls-panel button[aria-pressed="true"] {
      background: rgba(88, 194, 255, 0.18);
      border-color: var(--highlight-color);
      color: var(--highlight-color);
    }
    .controls-panel button:hover {
      border-color: rgba(88, 194, 255, 0.5);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 12px;
      padding: 8px 12px;
      backdrop-filter: blur(10px);
    }
    .slider-group-label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      width: 100%;
      min-width: 112px;
    }
    .slider-group-label-row .slider-name {
      font-size: 0.52rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(200, 228, 255, 0.5);
    }
    .slider-group-label-row .slider-value {
      font-size: 0.65rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--highlight-color);
      font-weight: 500;
    }
    .slider-group input[type="range"] {
      width: 80px;
      accent-color: var(--highlight-color);
    }
    .slider-group input[type="color"] {
      width: 28px;
      height: 22px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .no-webgpu {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 100;
      color: var(--foreground-color);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
      background: var(--background-color);
    }

    .context-menu {
      position: fixed;
      z-index: 20;
      min-width: 11rem;
      padding: 6px 0;
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
    }
    .context-menu[hidden] { display: none !important; }
    .context-menu .ctx-heading {
      padding: 6px 14px 4px;
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(200, 228, 255, 0.45);
    }
    .context-menu .ctx-sep {
      height: 1px;
      margin: 6px 10px;
      background: rgba(88, 194, 255, 0.12);
    }
    .context-menu .ctx-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 14px;
      border: none;
      background: none;
      color: var(--foreground-color);
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .context-menu .ctx-item:hover,
    .context-menu .ctx-item:focus-visible {
      outline: none;
      background: rgba(88, 194, 255, 0.12);
      color: var(--highlight-color);
    }
    .context-menu .ctx-item[aria-checked="true"]::before {
      content: '✓ ';
      color: var(--highlight-color);
    }
  </style>
</head>
<body>
  <!-- WebGPU shader canvas: transparent overlay, pointer-events: none, z-index 1 -->
  <canvas id="shader" aria-hidden="true"></canvas>

  <!-- Widget layer: HTML/CSS widgets sit above the shader (z-index 2).
       Any element with [data-goo] is tracked by the shader for reactive effects. -->
  <div class="widget-layer" id="widget-layer">
    <div class="widget" id="radial-widget">
      <div class="radial-menu" id="radial-menu">
        <a class="radial-item" href="#" title="Alex">
          <div class="avatar-info-card">
            <div class="avatar-info-card__surface">
              <p class="avatar-info-card__handle">@alex</p>
              <p class="avatar-info-card__slack">Last Slack: Can you review the PR by EOD?</p>
              <div class="avatar-info-card__compose">
                <input type="text" class="avatar-info-card__input" placeholder="Message…" autocomplete="off" />
                <button type="button" class="avatar-info-card__send" aria-label="Send">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 14l11 -11" /><path d="M21 3l-6.5 18a.55 .55 0 0 1 -1 0l-3.5 -7l-7 -3.5a.55 .55 0 0 1 0 -1l18 -6.5" /></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="circle circle--avatar" data-goo data-presence="available"><img src="https://i.pravatar.cc/120?img=11" alt="Alex"></div>
          <span class="avatar-status" aria-label="Status" role="img">💬</span>
          <span class="avatar-ptt"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icons-tabler-filled icon-tabler-microphone"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M19 9a1 1 0 0 1 1 1a8 8 0 0 1 -6.999 7.938l-.001 2.062h3a1 1 0 0 1 0 2h-8a1 1 0 0 1 0 -2h3v-2.062a8 8 0 0 1 -7 -7.938a1 1 0 1 1 2 0a6 6 0 0 0 12 0a1 1 0 0 1 1 -1m-7 -8a4 4 0 0 1 4 4v5a4 4 0 1 1 -8 0v-5a4 4 0 0 1 4 -4" /></svg></span>
        </a>
        <a class="radial-item" href="#" title="Jordan" data-screen-sharing>
          <div class="avatar-info-card">
            <div class="avatar-info-card__surface">
              <p class="avatar-info-card__handle">@jordan</p>
              <p class="avatar-info-card__slack">Last Slack: Pushed the goo shader — ping me if you want a walkthrough</p>
              <div class="avatar-info-card__compose">
                <input type="text" class="avatar-info-card__input" placeholder="Message…" autocomplete="off" />
                <button type="button" class="avatar-info-card__send" aria-label="Send">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 14l11 -11" /><path d="M21 3l-6.5 18a.55 .55 0 0 1 -1 0l-3.5 -7l-7 -3.5a.55 .55 0 0 1 0 -1l18 -6.5" /></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="avatar-screen-preview" role="img" aria-label="Screen share preview"></div>
          <div class="circle circle--avatar" data-goo data-presence="available"><img src="https://i.pravatar.cc/120?img=32" alt="Jordan"></div>
          <span class="avatar-status" aria-label="Status" role="img">✋</span>
        </a>
        <a class="radial-item" href="#" title="Sam">
          <div class="avatar-info-card">
            <div class="avatar-info-card__surface">
              <p class="avatar-info-card__handle">@sam</p>

  <script>
// =============================================================================
// ARCHITECTURE OVERVIEW
// =============================================================================
//
// This is a full-screen WebGPU shader overlay for use in an Electron-style app.
// The stack has three layers (bottom to top):
//
//   1. BACKGROUND — a desktop mockup image (CSS background on <body>)
//   2. SHADER LAYER — a <canvas> covering the body, renders via WebGPU.
//      Transparent (alphaMode: premultiplied), pointer-events: none.
//      Currently supports three switchable effects:
//        - GOO:   Liquid/metaball SDF blending around widgets (purely analytical)
//        - WATER: 2D wave equation sim (Hugo Elias algorithm, CPU-side)
//        - SMOKE: 2D Navier-Stokes fluid sim (CPU-side advection + vorticity)
//      Plus an overlay pipeline for darts & glass crack effects.
//   3. WIDGET LAYER — HTML/CSS elements with [data-goo] attributes that the
//      shader layer reacts to. Draggable via the generic makeDraggable() system
//      with edge-snapping. Currently two widgets:
//        - Team radial menu (hub + avatar satellites)
//        - Nerf dart crosshair button
//
// All widgets are scanned at init via querySelectorAll('[data-goo]'). Each frame,
// their bounding rects are read, velocities computed via smoothed deltas, and
// positions/sizes written to a GPU storage buffer for the shaders to consume.
//
// The water and smoke effects use CPU-side simulations (Float32Arrays with
// ping-pong or advection), uploaded to binding(2) as a storage buffer each frame.
// The goo effect is purely analytical (no simulation buffer needed).
//
// Coordinate spaces:
//   - "body px"   — relative to <body> top-left (widget positions live here)
//   - "canvas px" — body px * devicePixelRatio (shader resolution, GPU buffers)
//   - "sim px"    — body px / 2 (water) or / 4 (smoke), for CPU sim grids
//   - "UV"        — 0..1 normalized (vertex shader output, fragment shader input)
// =============================================================================

const MAX_WIDGETS = 16;
// On HiDPI (Retina) displays render at 1x instead of 2x — 75% fewer pixels, negligible
// quality difference on smooth shader effects. Standard 1x displays use native resolution.
const RENDER_SCALE = window.devicePixelRatio >= 2 ? 0.5 : 1.0;

// Viscosity scale factors for goo edge-blending per widget type.
// 1.0 = full viscosity slider effect, 0.0 = no edge attraction.
const GOO_VISCOSITY_HUB    = 1.0;
const GOO_VISCOSITY_AVATAR = 0.50;

// =============================================================================
// SHARED WGSL — included by all three effect shaders (goo, water, smoke).
// Defines the Globals uniform struct, Widget storage struct, full-screen quad
// vertex shader, and a universal rounded-rect SDF function.
// =============================================================================
const SHARED_WGSL = `
// All fields are written from JS each frame. Struct is 64 bytes (16-byte aligned due to vec4f).
struct Globals {
  resolution: vec2f,     // canvas size in device pixels (body * dpr)
  time: f32,             // performance.now() / 1000
  dt: f32,               // frame delta in seconds (capped at 0.05)
  color: vec4f,          // user-selected effect color (from color picker)
  viscosity: f32,        // slider 0..1 — controls damping / field persistence
  momentum: f32,         // slider 0..1 — controls velocity reactivity
  widget_count: f32,     // number of active widgets this frame
  sim_size: vec2f,       // water/smoke sim grid dimensions (in sim pixels); follows implicit padding to align vec2
  _pad0: f32,
  _pad1: f32,
};

// Per-widget data written from JS. 32 bytes per widget.
struct Widget {
  pos: vec2f,            // center position in canvas pixels
  vel: vec2f,            // smoothed velocity in body px/s (not DPR-scaled)
  size: vec2f,           // width, height in canvas pixels
  radius: f32,           // CSS border-radius in canvas pixels (for SDF)
  blend_k: f32,          // scale factor on k for edge-blending (1.0 = full viscosity, <1 = reduced)
};

@group(0) @binding(0) var<uniform> globals: Globals;
@group(0) @binding(1) var<storage, read> widgets: array<Widget, ${MAX_WIDGETS}>;

struct VSOut {
  @builtin(position) pos: vec4f,
  @location(0) uv: vec2f,
};

@vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
  var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
  var out: VSOut;
  out.pos = vec4f(p[i], 0, 1);
  out.uv = (p[i] + 1.0) * 0.5;
  out.uv.y = 1.0 - out.uv.y;
  return out;
}

// Universal rounded-rectangle SDF. Handles circles as a special case when
// r >= min(half.x, half.y). Returns negative inside, zero on surface, positive outside.
fn sdf_shape(delta: vec2f, half: vec2f, r: f32) -> f32 {
  let cr = min(r, min(half.x, half.y));
  let q = abs(delta) - half + vec2f(cr);
  return length(max(q, vec2f(0.0))) + min(max(q.x, q.y), 0.0) - cr;
}
`;

// =============================================================================
// GOO SHADER — Purely analytical, no simulation buffer.
// Renders a solid-color metaball-style liquid that merges widgets together.
// Uses smin (smooth minimum) to blend SDF fields from all widgets + screen edges.
// Velocity-based distortion stretches the goo into teardrop shapes during movement.
// =============================================================================
const GOO_WGSL = SHARED_WGSL + `
// Smooth minimum blends two SDF values with a smooth transition zone of width k.
fn smin(a: f32, b: f32, k: f32) -> f32 {
  let h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

@fragment fn fs(v: VSOut) -> @location(0) vec4f {
  let px = v.uv * globals.resolution;
  let n = i32(globals.widget_count);

  let k = 12.0 + globals.viscosity * 60.0;

  let edge_margin = 5.0;
  let edge_d: f32 = min(
    min(px.x + edge_margin, globals.resolution.x - px.x + edge_margin),
    min(px.y + edge_margin, globals.resolution.y - px.y + edge_margin)
  );

  // Each widget blends independently with screen edges via smin(edge_d, wd, k * blend_k).
  // Hard min between widgets — they never reach toward each other.
  // blend_k scales viscosity per-widget: hub=1.0 (full), avatars=0.25 (subtle).
  var d: f32 = edge_d;
  for (var i = 0; i < ${MAX_WIDGETS}; i++) {
    if (i >= n) { break; }
    let w = widgets[i];
    let delta = px - w.pos;
    let speed = length(w.vel);
    let mom = globals.momentum;
    let half = w.size * 0.5;

    var wd: f32;
    if (speed > 0.5) {
      let vd = w.vel / speed;
      let along = dot(delta, vd);
      let perp = delta - vd * along;
      let squash = 1.0 / (1.0 + speed * mom * 0.0008);
      let shifted = along + speed * mom * 0.04;
      wd = sdf_shape(vd * shifted * squash + perp, half, w.radius);
    } else {
      wd = sdf_shape(delta, half, w.radius);
    }

    d = min(d, smin(edge_d, wd, k * w.blend_k));
  }

  let aa = 0.5;
  let body = 1.0 - smoothstep(-aa, aa, d);
  let c = globals.color.rgb;
  return vec4f(c * body, body);
}
`;

// =============================================================================
// WATER SHADER — Reads from a CPU-computed wave height field (binding 2).
// The wave sim runs the Hugo Elias 2D wave equation on CPU (see stepWaveSim).
// This shader samples the height field, computes surface normals via finite
// differences, and applies Blinn-Phong lighting with a specular highlight.
// Completely transparent at rest (early-out when energy < threshold).
// =============================================================================
const WATER_WGSL = SHARED_WGSL + `
// Wave height field uploaded from CPU each frame (simW * simH floats)
@group(0) @binding(2) var<storage, read> wave: array<f32>;

@fragment fn fs(v: VSOut) -> @location(0) vec4f {
  let sw = i32(globals.sim_size.x);
  let sh = i32(globals.sim_size.y);
  if (sw < 2 || sh < 2) { return vec4f(0.0); }

  let sx = clamp(i32(v.uv.x * globals.sim_size.x), 0, sw - 1);
  let sy = clamp(i32(v.uv.y * globals.sim_size.y), 0, sh - 1);

  let h   = wave[sy * sw + sx];
  let h_r = wave[sy * sw + min(sx + 1, sw - 1)];
  let h_u = wave[max(sy - 1, 0) * sw + sx];

  let gx = h_r - h;
  let gy = h_u - h;
  let energy = abs(h) + length(vec2f(gx, gy)) * 8.0;
  if (energy < 0.001) { return vec4f(0.0); }

  let normal = normalize(vec3f(-gx * 60.0, -gy * 60.0, 1.0));
  let light = normalize(vec3f(1.0, -1.0, 0.7));
  let half_v = normalize(light + vec3f(0.0, 0.0, 1.0));
  let spec = pow(max(dot(normal, half_v), 0.0), 60.0);
  let diff = dot(normal, light) * 0.5 + 0.5;

  let c = globals.color.rgb;
  let tint = c * 0.2 * (diff * 2.0 - 1.0);
  let specular = vec3f(1.0) * spec;
  let color_out = max(tint + specular, vec3f(0.0));
  let alpha = clamp(energy * 5.0, 0.0, 0.6);

  return vec4f(color_out * alpha, alpha);
}
`;

// =============================================================================
// SMOKE SHADER — Reads from a CPU-computed density field (binding 2).
// The smoke sim is a 2D Navier-Stokes solver (see stepSmokeSim) with
// semi-Lagrangian advection + vorticity confinement. Density is injected at
// widget surfaces proportional to movement speed, then advected by the velocity
// field to create trailing wisps. Uses bilinear interpolation for smooth output
// and gradient-based lighting for subtle 3D depth.
// =============================================================================
const SMOKE_WGSL = SHARED_WGSL + `
// Smoke density field uploaded from CPU each frame (smokeW * smokeH floats)
@group(0) @binding(2) var<storage, read> field: array<f32>;

// Bilinear interpolation for smooth density sampling at sub-pixel coordinates
fn sample_field(uv: vec2f) -> f32 {
  let sw = globals.sim_size.x;
  let sh = globals.sim_size.y;
  let fx = uv.x * sw - 0.5;
  let fy = uv.y * sh - 0.5;
  let ix = i32(floor(fx));
  let iy = i32(floor(fy));
  let s = fract(fx);
  let t = fract(fy);
  let isw = i32(sw);
  let ish = i32(sh);
  let cix  = clamp(ix,     0, isw - 1);
  let ciy  = clamp(iy,     0, ish - 1);
  let cix1 = clamp(ix + 1, 0, isw - 1);
  let ciy1 = clamp(iy + 1, 0, ish - 1);
  let a = field[ciy  * isw + cix];
  let b = field[ciy  * isw + cix1];
  let cc = field[ciy1 * isw + cix];
  let d = field[ciy1 * isw + cix1];
  return mix(mix(a, b, s), mix(cc, d, s), t);
}

@fragment fn fs(v: VSOut) -> @location(0) vec4f {
  let sw = i32(globals.sim_size.x);
  let sh = i32(globals.sim_size.y);
  if (sw < 2 || sh < 2) { return vec4f(0.0); }

  let d = sample_field(v.uv);
  if (d < 0.003) { return vec4f(0.0); }

  let eps = vec2f(1.0 / globals.sim_size.x, 1.0 / globals.sim_size.y);
  let dx = sample_field(v.uv + vec2f(eps.x, 0.0)) - d;
  let dy = sample_field(v.uv + vec2f(0.0, eps.y)) - d;

  let normal = normalize(vec3f(-dx * 25.0, -dy * 25.0, 1.0));
  let light = normalize(vec3f(1.0, -1.0, 0.8));
  let diff = dot(normal, light) * 0.5 + 0.5;

  let c = globals.color.rgb;
  let lit = c * mix(0.5, 1.3, diff);
  let alpha = clamp(d * 0.85, 0.0, 0.75);
  return vec4f(lit * alpha, alpha);
}
`;

// =============================================================================
// DART (true 3D mesh) & GLASS SHATTER (2D crack overlay).
// Darts: cylinder body + sphere tip, real 3D geometry rendered with perspective
// projection. Camera sits behind the viewer; darts fly along Z toward screen.
// Glass: samples glass_shatter_[1-4].svg from a 2D texture array (unchanged).
// =============================================================================
const MAX_DARTS = 200;
const MAX_CRACKS = 200;

const DART_3D_WGSL = `
struct Camera {
  viewProj: mat4x4f,
};
struct Instance {
  model: mat4x4f,
  color: vec4f,
};

@group(0) @binding(0) var<uniform> cam: Camera;
@group(0) @binding(1) var<storage, read> instances: array<Instance, ${MAX_DARTS}>;

struct VIn {
  @location(0) pos: vec3f,
  @location(1) normal: vec3f,
  @location(2) matId: f32,
};

struct VOut {
  @builtin(position) pos: vec4f,
  @location(0) wNorm: vec3f,
  @location(1) matId: f32,
  @location(2) alpha: f32,
};

@vertex fn vs(v: VIn, @builtin(instance_index) ii: u32) -> VOut {
  let inst = instances[ii];
  let wp = inst.model * vec4f(v.pos, 1.0);
  let wn = normalize((inst.model * vec4f(v.normal, 0.0)).xyz);
  var o: VOut;
  o.pos = cam.viewProj * wp;
  o.wNorm = wn;
  o.matId = v.matId;
  o.alpha = inst.color.a;
  return o;
}

@fragment fn fs(v: VOut) -> @location(0) vec4f {
  let n = normalize(v.wNorm);
  let light = normalize(vec3f(0.3, -0.5, -0.8));
  let diff = 0.45 + 0.55 * max(dot(n, -light), 0.0);
  let h = normalize(-light + vec3f(0.0, 0.0, -1.0));
  let spec = pow(max(dot(n, h), 0.0), 32.0) * 0.35;

  var base: vec3f;
  if (v.matId < 0.5) {
    base = vec3f(0.10, 0.38, 0.92);
  } else {
    base = vec3f(1.0, 0.42, 0.08);
  }
  let col = base * diff + vec3f(1.0) * spec;
  let a = v.alpha;
  return vec4f(col * a, a);
}
`;

// 2D fullscreen procedural glass crack pass (Voronoi edges + radial lines)
const CRACK_2D_WGSL = `
struct CrackGlobals {
  resolution: vec2f,
  time: f32,
  crack_count: f32,
};
struct Crack {
  pos: vec2f,
  age: f32,
  intensity: f32,
  seed: f32,
  growth: f32,
  _p1: f32, _p2: f32,
};

@group(0) @binding(0) var<uniform> cg: CrackGlobals;
@group(0) @binding(1) var<storage, read> cracks: array<Crack, ${MAX_CRACKS}>;

struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f };

@vertex fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
  var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
  var o: VSOut;
  o.pos = vec4f(p[vi], 0, 1);
  o.uv = p[vi] * 0.5 + 0.5;
  o.uv.y = 1.0 - o.uv.y;
  return o;
}

fn hash2(p: vec2f) -> vec2f {
  return fract(sin(vec2f(dot(p, vec2f(127.1, 311.7)), dot(p, vec2f(269.5, 183.3)))) * 43758.5453);
}

fn hash1(p: f32) -> f32 { return fract(sin(p * 127.1) * 43758.5453); }

fn voronoi_crack(p: vec2f, seed: f32, thickness: f32) -> f32 {
  let cell = floor(p);
  var d1 = 1e5;
  var d2 = 1e5;
  for (var y = -1; y <= 1; y++) {
    for (var x = -1; x <= 1; x++) {
      let neighbor = cell + vec2f(f32(x), f32(y));
      let pt = neighbor + hash2(neighbor + seed);
      let dd = dot(p - pt, p - pt);
      if (dd < d1) { d2 = d1; d1 = dd; }
      else if (dd < d2) { d2 = dd; }
    }
  }
  return smoothstep(0.0, thickness, sqrt(d2) - sqrt(d1));
}

// Shared jagged boundary curve for a radial boundary index.
// Adjacent sectors sample the same boundary id, so seams match perfectly.
fn boundary_jitter(boundaryId: i32, r01: f32, seed: f32, stepA: f32) -> f32 {
  let rid = clamp(r01, 0.0, 1.0) * 10.0;
  let i0 = floor(rid);
  let i1 = min(i0 + 1.0, 10.0);
  let t = rid - i0;
  let b = f32(boundaryId);
  let j0 = (hash1(seed + b * 17.73 + i0 * 31.9) - 0.5);
  let j1 = (hash1(seed + b * 17.73 + i1 * 31.9) - 0.5);
  let j = mix(j0, j1, t);
  return j * (stepA * 0.30);
}

fn render_crack(px: vec2f, crack: Crack) -> vec4f {
  let d = px - crack.pos;
  let dist = length(d);
  if (dist > crack.growth) { return vec4f(0.0); }

  let diag = length(cg.resolution);
  let impactR = 105.0 * (diag / 2000.0);

  // --- Polar sector partition ---
  let tau = 6.2831853;
  let ang0 = atan2(d.y, d.x);
  let ang = select(ang0 + tau, ang0, ang0 >= 0.0);
  let r01 = clamp(dist / max(impactR * 2.2, 1.0), 0.0, 1.0);

  let sectorCount = 6 + i32(floor(hash1(crack.seed * 2.31) * 3.0)); // 6..8

  // Randomized sector widths (still tile full 360 exactly)
  var weights: array<f32, 8>;
  var wsum = 0.0;
  for (var i = 0; i < 8; i++) {
    if (i < sectorCount) {
      let w = 0.75 + hash1(crack.seed + f32(i) * 11.7) * 1.10;
      weights[i] = w;
      wsum += w;
    } else {
      weights[i] = 0.0;
    }
  }
  let angleScale = tau / max(wsum, 0.0001);
  var sector = sectorCount - 1;
  var leftBase = 0.0;
  var rightBase = tau;
  var acc = 0.0;
  for (var i = 0; i < 8; i++) {
    if (i >= sectorCount) { break; }
    let segA = weights[i] * angleScale;
    let next = acc + segA;
    if (ang >= acc && ang < next) {
      sector = i;
      leftBase = acc;
      rightBase = next;
      break;
    }
    acc = next;
  }
  let stepA = rightBase - leftBase;
  let localA = ang - leftBase;

  // Left/right shared boundaries for this sector, both jittered by radius.
  let bLeft = sector;
  let bRight = (sector + 1) % sectorCount;
  let leftA = boundary_jitter(bLeft, r01, crack.seed, stepA);
  let rightA = stepA + boundary_jitter(bRight, r01, crack.seed, stepA);

  let aaA = 0.010;
  let inLeft = smoothstep(leftA - aaA, leftA + aaA, localA);
  let inRight = 1.0 - smoothstep(rightA - aaA, rightA + aaA, localA);
  let sectorMask = clamp(inLeft * inRight, 0.0, 1.0);

  // Distance to nearest seam in screen-space pixels.
  let dLeftPx = abs(localA - leftA) * max(dist, 1.0);
  let dRightPx = abs(rightA - localA) * max(dist, 1.0);
  let seamDist = min(dLeftPx, dRightPx);
  let nearestBoundary = select(bRight, bLeft, dLeftPx < dRightPx);

  // --- Center knockout hole (jagged polygon tied to sector seams) ---
  // Radius values are keyed by boundary ids so adjacent sectors share the same
  // corner values where seams meet. This keeps the hole contour aligned.
  let holeBase = impactR * 0.14;
  let holeVarL = 0.75 + hash1(crack.seed * 3.91 + f32(bLeft) * 5.17) * 0.70;
  let holeVarR = 0.75 + hash1(crack.seed * 3.91 + f32(bRight) * 5.17) * 0.70;
  let tA = clamp(localA / max(stepA, 0.0001), 0.0, 1.0);
  let holeR = mix(holeBase * holeVarL, holeBase * holeVarR, tA);
  let holeAA = 1.6 * (diag / 2000.0);
  let holeMask = smoothstep(holeR - holeAA, holeR + holeAA, dist);

  // --- Voronoi interior inside each sector, tight around impact ---
  let compression = 1.0 + 3.2 * (1.0 - smoothstep(0.0, impactR, dist));
  let scale = 0.024 * (2000.0 / diag) * compression;
  let sectorSeed = crack.seed + f32(sector) * 37.17;
  // Per-sector transform to visually separate each shard pattern.
  let secRand = hash2(vec2f(sectorSeed * 1.37, sectorSeed * 2.11));
  let secRot = (secRand.x - 0.5) * 1.20;
  let cr = cos(secRot);
  let sr = sin(secRot);
  let p0 = d * scale;
  let p1 = vec2f(p0.x * cr - p0.y * sr, p0.x * sr + p0.y * cr);
  let pLocal = p1 + (secRand - vec2f(0.5)) * 0.95;
  let secThickness = mix(0.048, 0.078, secRand.y);
  let edge = voronoi_crack(pLocal, sectorSeed, secThickness);
  var voroInterior = (1.0 - edge) * sectorMask;
  let interiorFalloff = 1.0 - smoothstep(impactR * 0.55, impactR * 1.15, dist);
  voroInterior *= interiorFalloff;

  // --- Seam strokes (new crack lines) ---
  let seamWidth = 2.0 * (diag / 2000.0);
  let seamStroke = 1.0 - smoothstep(0.0, seamWidth, seamDist);

  // Continue only a few seams farther out; pick by boundary id.
  let continueMask = select(0.0, 1.0, hash1(crack.seed + f32(nearestBoundary) * 19.1) < 0.42);
  let nearSeam = 1.0 - smoothstep(impactR * 0.7, impactR * 1.6, dist);
  let farSeam = smoothstep(impactR * 0.85, impactR * 1.2, dist) * continueMask * (1.0 - smoothstep(impactR * 1.2, impactR * 2.2, dist));
  let seamAlpha = seamStroke * max(nearSeam, farSeam);

  let crackLine = max(voroInterior, seamAlpha);

  let growEdge = 1.0 - smoothstep(crack.growth * 0.85, crack.growth, dist);
  let a = crackLine * growEdge * crack.intensity * holeMask;
  if (a < 0.005) { return vec4f(0.0); }

  let glass = vec3f(0.82, 0.92, 1.0);
  return vec4f(glass * a, a);
}

@fragment fn fs(v: VSOut) -> @location(0) vec4f {
  let px = v.uv * cg.resolution;
  var col = vec4f(0.0);
  for (var i = 0; i < ${MAX_CRACKS}; i++) {
    if (i >= i32(cg.crack_count)) { break; }
    let c = render_crack(px, cracks[i]);
    col = col + c * (1.0 - col.a);
  }
  return col;
}
`;

// Generate dart 3D mesh: cylinder (body) along +X, sphere (tip) at front.
function generateDartMesh() {
  const bodyHL = 48, bodyR = 10;
  const segs = 16, hemiRings = 8;
  const pos = [], nrm = [], mat = [], idx = [];
  let vi = 0;

  // Cylinder tube
  for (let i = 0; i <= segs; i++) {
    const a = (i / segs) * Math.PI * 2;
    const ca = Math.cos(a), sa = Math.sin(a);
    pos.push(bodyHL, ca * bodyR, sa * bodyR);
    nrm.push(0, ca, sa); mat.push(0);
    pos.push(-bodyHL, ca * bodyR, sa * bodyR);
    nrm.push(0, ca, sa); mat.push(0);
  }
  for (let i = 0; i < segs; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    idx.push(a, b, c, c, b, d);
  }
  vi = pos.length / 3;

  // Back cap (flat disc at -bodyHL)
  pos.push(-bodyHL, 0, 0); nrm.push(-1, 0, 0); mat.push(0);
  const bc = vi; vi++;
  for (let i = 0; i <= segs; i++) {
    const a = (i / segs) * Math.PI * 2;
    pos.push(-bodyHL, Math.cos(a) * bodyR, Math.sin(a) * bodyR);
    nrm.push(-1, 0, 0); mat.push(0); vi++;
  }
  for (let i = 0; i < segs; i++) idx.push(bc, bc + 2 + i, bc + 1 + i);

  // Hemisphere tip at +bodyHL (same radius as shaft, phi 0..PI/2 only)
  const sv = vi;
  for (let r = 0; r <= hemiRings; r++) {
    const phi = (r / hemiRings) * Math.PI * 0.5;
    const sp = Math.sin(phi), cp = Math.cos(phi);
    for (let s = 0; s <= segs; s++) {
      const theta = (s / segs) * Math.PI * 2;
      const st = Math.sin(theta), ct = Math.cos(theta);
      const nx = cp, ny = sp * ct, nz = sp * st;
      pos.push(bodyHL + nx * bodyR, ny * bodyR, nz * bodyR);
      nrm.push(nx, ny, nz); mat.push(1); vi++;
    }
  }
  for (let r = 0; r < hemiRings; r++) {
    for (let s = 0; s < segs; s++) {
      const a = sv + r * (segs + 1) + s;
      const b = a + segs + 1;
      idx.push(a, b, a + 1, a + 1, b, b + 1);
    }
  }

  return {
    positions: new Float32Array(pos),
    normals: new Float32Array(nrm),
    matIds: new Float32Array(mat),
    indices: new Uint16Array(idx),
    vertexCount: vi,
    indexCount: idx.length,
  };
}

// Build model matrix: mesh +X = forward direction, +Y = up, +Z = right.
function buildDartModelMatrix(out, px, py, pz, fx, fy, fz, scale) {
  const fl = Math.hypot(fx, fy, fz) || 1;
  const Fx = fx / fl, Fy = fy / fl, Fz = fz / fl;
  // Right = cross(Forward, worldUp), worldUp = (0,1,0)
  let Rx = -Fz, Ry = 0, Rz = Fx;
  let rl = Math.hypot(Rx, Ry, Rz);
  if (rl < 1e-6) { Rx = 0; Ry = 0; Rz = 1; rl = 1; }
  Rx /= rl; Ry /= rl; Rz /= rl;
  const Ux = Ry * Fz - Rz * Fy, Uy = Rz * Fx - Rx * Fz, Uz = Rx * Fy - Ry * Fx;
  // col0 = Forward (mesh X), col1 = Up (mesh Y), col2 = Right (mesh Z)
  out[0]  = Fx * scale; out[1]  = Fy * scale; out[2]  = Fz * scale; out[3]  = 0;
  out[4]  = Ux * scale; out[5]  = Uy * scale; out[6]  = Uz * scale; out[7]  = 0;
  out[8]  = Rx * scale; out[9]  = Ry * scale; out[10] = Rz * scale; out[11] = 0;
  out[12] = px;         out[13] = py;         out[14] = pz;         out[15] = 1;
}

// Perspective: maps view-space (-Z forward) to WebGPU clip space (Z in [0,1]).
function perspectiveMatrix(out, fovY, aspect, near, far) {
  const f = 1 / Math.tan(fovY * 0.5);
  const d = 1 / (far - near);
  out.fill(0);
  out[0]  = f / aspect;
  out[5]  = f;
  out[10] = far * d;
  out[11] = 1;
  out[14] = -(near * far * d);
}

// LookAt: eye looking at target with given up; view-space has +Z going away from eye (into scene).
function lookAtMatrix(out, ex, ey, ez, tx, ty, tz, ux, uy, uz) {
  let fx = tx - ex, fy = ty - ey, fz = tz - ez;
  let fl = Math.hypot(fx, fy, fz); fx /= fl; fy /= fl; fz /= fl;
  let rx = fy * uz - fz * uy, ry = fz * ux - fx * uz, rz = fx * uy - fy * ux;
  let rl = Math.hypot(rx, ry, rz); rx /= rl; ry /= rl; rz /= rl;
  const ux2 = ry * fz - rz * fy, uy2 = rz * fx - rx * fz, uz2 = rx * fy - ry * fx;
  out[0] = rx;   out[1] = ux2;  out[2] = fx;   out[3] = 0;
  out[4] = ry;   out[5] = uy2;  out[6] = fy;   out[7] = 0;
  out[8] = rz;   out[9] = uz2;  out[10] = fz;  out[11] = 0;
  out[12] = -(rx * ex + ry * ey + rz * ez);
  out[13] = -(ux2 * ex + uy2 * ey + uz2 * ez);
  out[14] = -(fx * ex + fy * ey + fz * ez);
  out[15] = 1;
}

function mat4Multiply(out, a, b) {
  for (let i = 0; i < 4; i++) {
    const ai0 = a[i], ai1 = a[i+4], ai2 = a[i+8], ai3 = a[i+12];
    out[i]    = ai0*b[0]  + ai1*b[1]  + ai2*b[2]  + ai3*b[3];
    out[i+4]  = ai0*b[4]  + ai1*b[5]  + ai2*b[6]  + ai3*b[7];
    out[i+8]  = ai0*b[8]  + ai1*b[9]  + ai2*b[10] + ai3*b[11];
    out[i+12] = ai0*b[12] + ai1*b[13] + ai2*b[14] + ai3*b[15];
  }
}

// =============================================================================
// MAIN — WebGPU initialization, pipeline creation, simulation setup, frame loop
// =============================================================================
async function main() {
  if (!navigator.gpu) {
    document.body.innerHTML = '<div class="no-webgpu">WebGPU is not supported in this browser.<br>Try Chrome 113+ or Edge 113+.</div>';
    return;
  }

  // Expose shared utilities before the first await so defer scripts can use them.
  window.makeDraggable = makeDraggable;
  window.positionContextMenu = positionContextMenu;

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    document.body.innerHTML = '<div class="no-webgpu">Could not get a WebGPU adapter.</div>';
    return;
  }

  const device = await adapter.requestDevice();
  const canvas = document.getElementById('shader');
  const ctx = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();

  // premultiplied alpha lets the transparent canvas composite over the desktop background
  ctx.configure({
    device,
    format,
    alphaMode: 'premultiplied',
  });

  // --- GPU buffers for the main effect pipeline ---
  // Globals: 64 bytes uniform (matches Globals struct in SHARED_WGSL)
  // Widgets: MAX_WIDGETS * 32 bytes storage (array of Widget structs)
  // Wave/Smoke: CPU sim grid uploaded here; water and smoke share this buffer
  const globalsSize = 64;
  const widgetStride = 32;
  const widgetsBufSize = MAX_WIDGETS * widgetStride;

  const globalsBuffer = device.createBuffer({ size: globalsSize, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
  const widgetsBuffer = device.createBuffer({ size: widgetsBufSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

  // Water sim runs at body/2 resolution; smoke at body/4 (see stepSmokeSim).
  // Both upload their data to this same GPU buffer (binding 2). The shader
  // reads globals.sim_size to know the grid dimensions.
  const bodyRect0 = document.body.getBoundingClientRect();
  const simW = Math.ceil(bodyRect0.width / 2);
  const simH = Math.ceil(bodyRect0.height / 2);
  let waveA = new Float32Array(simW * simH);
  let waveB = new Float32Array(simW * simH);
  const waveBufSize = simW * simH * 4;
  const waveBuffer = device.createBuffer({ size: Math.max(waveBufSize, 4), usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

  // Bind group layout for the main effect pipeline.
  // binding 0: Globals uniform (all shaders use this)
  // binding 1: Widget array storage (all shaders use this)
  // binding 2: Sim data storage (water/smoke read this; goo ignores it)
  const bindGroupLayout = device.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.FRAGMENT | GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
      { binding: 1, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
      { binding: 2, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
    ],
  });

  const pipelineLayout = device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] });

  const bindGroup = device.createBindGroup({
    layout: bindGroupLayout,
    entries: [
      { binding: 0, resource: { buffer: globalsBuffer } },
      { binding: 1, resource: { buffer: widgetsBuffer } },
      { binding: 2, resource: { buffer: waveBuffer } },
    ],
  });

  // and blend mode (premultiplied alpha over). Only the fragment shader differs.
  function makePipeline(wgsl) {
    const module = device.createShaderModule({ code: wgsl });
    return device.createRenderPipeline({
      layout: pipelineLayout,
      vertex: { module, entryPoint: 'vs' },
      fragment: {
        module,
        entryPoint: 'fs',
        targets: [{
          format,
          blend: {
            color: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },
            alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },
          },
        }],
      },
      primitive: { topology: 'triangle-strip' },
    });

    goo: makePipeline(GOO_WGSL),
    water: makePipeline(WATER_WGSL),
    smoke: makePipeline(SMOKE_WGSL),

  const dartVBNrm = device.createBuffer({ size: dartMesh.normals.byteLength, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });

      size: { width: w, height: h },

    entries: [
      { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },

  const dart3dModule = device.createShaderModule({ code: DART_3D_WGSL });
  const dart3dPipeline = device.createRenderPipeline({
    layout: dart3dPipelineLayout,
    vertex: {
      module: dart3dModule,
      entryPoint: 'vs',
      buffers: [
        { arrayStride: 12, attributes: [{ shaderLocation: 0, offset: 0, format: 'float32x3' }] },
        { arrayStride: 12, attributes: [{ shaderLocation: 1, offset: 0, format: 'float32x3' }] },
        { arrayStride: 4,  attributes: [{ shaderLocation: 2, offset: 0, format: 'float32' }] },
      ],
    },
    fragment: {
      module: dart3dModule,
      entryPoint: 'fs',
      targets: [{
        format,
        blend: {
          color: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },
          alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },

  const crackBGL = device.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.FRAGMENT | GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },

  const crackPipeline = device.createRenderPipeline({
    layout: crackPipelineLayout,
    vertex: { module: crackModule, entryPoint: 'vs' },
    fragment: {
      module: crackModule,
      entryPoint: 'fs',
      targets: [{
        format,
        blend: {
          color: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },
          alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' },
        },
      }],
    },
    primitive: { topology: 'triangle-strip' },
  });
  const crackBindGroup = device.createBindGroup({
    layout: crackBGL,
    entries: [
      { binding: 0, resource: { buffer: crackGlobalsBuffer } },
      { binding: 1, resource: { buffer: crackBuffer } },
    ],
  });

  const activeDarts = [];
  const activeCracks = [];

  let currentEffect = 'goo';

  // --- Generic drag + snap system ---
  // Any widget can be made draggable via makeDraggable(el, handle, callbacks).
  // Dragging uses pointer events on the handle element. When released near a
  // screen edge (within SNAP_THRESHOLD), the widget snaps flush to that edge
  // using CSS-native positioning (left:0 / right:0 / top:0 / bottom:0) so it
  // works regardless of widget size. The 'snapped' CSS class enables smooth
  // transition animation only on pointerup (not during live drag).
  const SNAP_THRESHOLD = 50;

  function getBodySize() {
    const r = document.body.getBoundingClientRect();
    return { w: r.width, h: r.height };

  function detectSnap(cx, cy) {
    const { w: bw, h: bh } = getBodySize();
    const nearL = cx < SNAP_THRESHOLD;
    const nearR = cx > bw - SNAP_THRESHOLD;
    const nearT = cy < SNAP_THRESHOLD;
    const nearB = cy > bh - SNAP_THRESHOLD;
    if (nearT && nearL) return 'top-left';
    if (nearT && nearR) return 'top-right';
    if (nearB && nearR) return 'bottom-right';
    if (nearB && nearL) return 'bottom-left';
    if (nearT) return 'top';
    if (nearB) return 'bottom';
    if (nearL) return 'left';
    if (nearR) return 'right';

  // Callbacks: onClick() — fired on click (no drag); clamp(snap, cx, cy) — constrain position

  function makeDraggable(el, handle, cbs) {

      const s = el.style;
      s.left = ''; s.right = ''; s.top = ''; s.bottom = '';
      const hx = handle.offsetLeft + handle.offsetWidth / 2;
      const hy = handle.offsetTop + handle.offsetHeight / 2;
      if (!snap) {
        s.left = (cx - hx) + 'px';
        s.top = (cy - hy) + 'px';
      } else {
        if (snap.includes('left'))        s.left = '0';
        else if (snap.includes('right')) s.right = '0';
