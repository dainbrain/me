<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UI experiments gallery — static HTML bits under /uibits.">
  <title>UI bits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --border: #2a2a2e;
      --text: #f2f0ec;
      --muted: #8a8780;
      --accent: #7cb8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: 14px;
      color: var(--text);
      background:
        radial-gradient(ellipse 120% 80% at 10% -20%, rgba(124, 184, 255, 0.12), transparent 50%),
        radial-gradient(ellipse 80% 60% at 100% 0%, rgba(255, 120, 90, 0.08), transparent 45%),
        var(--bg);
    }
    header {
      padding: 2rem clamp(1.25rem, 4vw, 3rem) 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(20, 20, 22, 0.9), rgba(10, 10, 11, 0.6));
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-family: Syne, system-ui, sans-serif;
      font-weight: 700;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      letter-spacing: -0.02em;
    }
    .lede {
      margin: 0;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.55;
    }
    .lede code {
      font-size: 0.9em;
      color: var(--accent);
    }
    main {
      padding: 1.75rem clamp(1.25rem, 4vw, 3rem) 3rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
      gap: 1.25rem;
    }
    .card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      border-color: rgba(124, 184, 255, 0.45);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      transform: translateY(-2px);
    }
    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #080809;
      overflow: hidden;
    }
    .thumb-scale {
      position: absolute;
      top: 0;
      left: 0;
      width: 1280px;
      height: 800px;
      transform-origin: 0 0;
      pointer-events: none;
    }
    .thumb-scale iframe {
      width: 1280px;
      height: 800px;
      border: 0;
      display: block;
      background: #000;
    }
    .card-body {
      padding: 1rem 1.1rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .card-title {
      font-family: Syne, system-ui, sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }
    .card-desc {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-slug {
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.85;
    }
    .empty, .err {
      grid-column: 1 / -1;
      padding: 2rem;
      border-radius: 12px;
      border: 1px dashed var(--border);
      color: var(--muted);
      text-align: center;
    }
    .err { border-color: rgba(255, 120, 90, 0.4); color: #e8a090; }
    .status {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <header>
    <h1>UI bits</h1>
    <p class="lede">
      Create a subfolder in <code>public/uibits/</code> with an <code>index.html</code>.
      Run <code>npm run dev</code> — the grid refreshes from <code>gallery.json</code> when files change.
    </p>
    <p class="status" id="status"></p>
  </header>
  <main>
    <div class="grid" id="grid" aria-live="polite"></div>
  </main>
  <script>
    (function () {
      const grid = document.getElementById('grid')
      const status = document.getElementById('status')

      function setThumbScale(wrap, scaleEl) {
        const w = wrap.clientWidth
        if (!w) return
        const s = w / 1280
        scaleEl.style.transform = 'scale(' + s + ')'
      }

      function observeThumbs() {
        const ro = new ResizeObserver((entries) => {
          for (const e of entries) {
            const wrap = e.target
            const scaleEl = wrap.querySelector('.thumb-scale')
            if (scaleEl) setThumbScale(wrap, scaleEl)
          }
        })
        grid.querySelectorAll('.thumb-wrap').forEach((el) => ro.observe(el))
      }

      function card(item) {
        const a = document.createElement('a')
        a.className = 'card'
        a.href = item.href
        a.setAttribute('aria-label', item.title + ' — open experiment')

        const thumbWrap = document.createElement('div')
        thumbWrap.className = 'thumb-wrap'

        const scale = document.createElement('div')
        scale.className = 'thumb-scale'

        const iframe = document.createElement('iframe')
        iframe.setAttribute('loading', 'lazy')
        iframe.setAttribute('referrerpolicy', 'no-referrer')
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin')
        iframe.setAttribute('title', 'Preview: ' + item.title)
        iframe.src = item.href

        scale.appendChild(iframe)
        thumbWrap.appendChild(scale)
        a.appendChild(thumbWrap)

        const body = document.createElement('div')
        body.className = 'card-body'

        const h2 = document.createElement('div')
        h2.className = 'card-title'
        h2.textContent = item.title
        body.appendChild(h2)

        if (item.description) {
          const p = document.createElement('p')
          p.className = 'card-desc'
          p.textContent = item.description
          body.appendChild(p)
        }

        const slug = document.createElement('div')
        slug.className = 'card-slug'
        slug.textContent = item.slug + '/'
        body.appendChild(slug)

        a.appendChild(body)
        return a
      }

      fetch('gallery.json', { cache: 'no-store' })
        .then((r) => {
          if (!r.ok) throw new Error('gallery.json missing or not served')
          return r.json()
        })
        .then((data) => {
          const list = data.experiments || []
          if (data.generated) {
            try {
              const d = new Date(data.generated)
              status.textContent =
                'Catalog updated ' +
                (isNaN(d.getTime()) ? data.generated : d.toLocaleString())
            } catch (_) {
              status.textContent = ''
            }
          }
          if (!list.length) {
            const empty = document.createElement('div')
            empty.className = 'empty'
            empty.innerHTML =
              'No experiments yet. Add <strong>public/uibits/your-name/index.html</strong> and save — the dev server regenerates the list.'
            grid.appendChild(empty)
            return
          }
          list.forEach((item) => grid.appendChild(card(item)))
          requestAnimationFrame(() => observeThumbs())
        })
        .catch(() => {
          const err = document.createElement('div')
          err.className = 'err'
          err.textContent =
            'Could not load gallery.json. Run npm run dev (or npm run build) so Vite generates it from your HTML files.'
          grid.appendChild(err)
        })
    })()
  </script>
</body>
</html>
